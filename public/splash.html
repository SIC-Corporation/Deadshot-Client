<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent; /* Allows Electron transparency to work */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* Glassmorphism Container */
        .splash-card {
            width: 85%;
            height: 80%;
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 71, 87, 0.3);
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            position: relative;
        }

        /* Logo with Pulsing Red Glow */
        .logo-container {
            position: relative;
            margin-bottom: 20px;
        }

        img {
            width: 280px; /* Adjusted for better scale */
            height: auto;
            pointer-events: none;
            filter: drop-shadow(0 0 20px rgba(255, 71, 87, 0.4));
            animation: pulseGlow 2.5s infinite ease-in-out;
        }

        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 15px rgba(255, 71, 87, 0.3)); opacity: 0.9; }
            50% { transform: scale(1.03); filter: drop-shadow(0 0 30px rgba(255, 71, 87, 0.7)); opacity: 1; }
        }

        /* NexaFlow Branding Text */
        .loader-text {
            color: white;
            font-size: 12px;
            letter-spacing: 4px;
            font-weight: 800;
            margin-top: 20px;
            text-transform: uppercase;
            opacity: 0.5;
        }

        /* Sleek Loading Bar */
        .progress-container {
            width: 250px;
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin-top: 30px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            width: 40%;
            height: 100%;
            background: linear-gradient(90deg, transparent, #ff4757, transparent);
            position: absolute;
            left: -40%;
            animation: loadingSlide 1.8s infinite ease-in-out;
        }

        @keyframes loadingSlide {
            0% { left: -40%; }
            100% { left: 100%; }
        }

        /* Subtitle Status */
        .status {
            position: absolute;
            bottom: 40px;
            color: #555;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="splash-card">
        <div class="logo-container">
            <img src="../build/splash.png" alt="Deadshot Logo">
        </div>
        
        <div class="loader-text">NexaFlow Launcher</div>
        
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>

        <div class="status">AUTHENTICATING WITH SIC CORP...</div>
    </div>
</body>
</html>
